[platformio]
; --- generic options ---
description  = Firmware for ESP8266/ESP32 by olonsoft Dimitris Paterakis
default_envs = nodemcuv2
; --- directory options ---
build_dir    = ${sysenv.TEMP}\pio\build
lib_dir      = .
src_dir      = examples/example1

[common] ; custom environment
build_flags =
    -std=gnu++17
    -D OLON_DEBUG
    -D MQTT_MAX_PACKET_SIZE=1024 ; for pubsubclient library
    ; --- optimization flags ---
    -Os
    -ffunction-sections
    -fdata-sections
    -Wl,--gc-sections
    -fno-exceptions
build_unflags =
    -std=gnu++11
    -std=gnu++14
build_type = debug ; release, test, debug
monitor_filters = direct
lib_deps =
    esp32async/ESPAsyncWebServer@^3.11.0
    bblanchon/ArduinoJson@^7.4.3

[env] ; common environment
framework = arduino
; valid values 300, 600, 1200, 2400, 4800, 9600, 19200, 38400, 57600, 74880, 115200, 230400, 256000, 460800, 921600, 1843200, 3686400
upload_speed = 921600
monitor_speed = 115200
board_build.filesystem = littlefs

[env:nodemcuv2]
board = nodemcuv2
platform = espressif8266
framework = arduino
build_flags =
  ${common.build_flags}
build_unflags =
  ${common.build_unflags}
lib_deps =
	${common.lib_deps}
	; any other esp8266 libraries
  ESP32Async/ESPAsyncTCP
	; vshymanskyy/Preferences @ ^2.2.2
monitor_filters   =
  ${common.monitor_filters}
  esp8266_exception_decoder

[env:nodemcu-32s]
board = nodemcu-32s
platform = espressif32
framework = arduino
build_flags =
  ${common.build_flags}
build_unflags =
  ${common.build_unflags}
lib_deps =
  ${common.lib_deps}
  ESP32Async/AsyncTCP
  ; any other esp32 libraries
monitor_filters   =
    ${common.monitor_filters}
    esp32_exception_decoder
board_build.partitions = partitions_custom.csv